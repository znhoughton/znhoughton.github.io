name: Update Publications from Google Scholar

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 6:00 AM UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  update-publications:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Needed to push the updated JSON back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch publications
        run: python scripts/fetch_publications.py

      - name: Commit and push if publications changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/publications.json
          git diff --staged --quiet || (
            git commit -m "chore: auto-update publications from Google Scholar [skip ci]" &&
            git push
          )
